<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Neo-Brutalism</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="mainbox">
        <h1 class="heading text-title">TIC • TAC • TOE</h1>

       <div class="score-board">
    <div class="player-box orange-bg left-box">
      <span class="player-name" id="player-one">PLAYER 1</span>
     <span class="score" id="score-one">[3]</span>
    </div>
    
    <p class="vs-text">vs</p>
    
    <div class="player-box orange-bg right-box">
        <span id="secondplayer" class="player-name">PLAYER 2</span>
        <span id="secondpoint" class="score">[1] </span>
        
    </div>
</div>

        <div class="status-bar">
            <p id="status-text">X'S TURN</p>
           <p id="status-text">X'S TURN</p>
        </div>

        <div class="grid">
            <div class="cell"></div>
            <div class="cell empty"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell empty"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
        </div>

        <div class="button-group">
            <button class="btn btn-primary">PLAY AGAIN</button>
            
        </div>
    </div>
<script src="app.js" defer~></script>
</body>
</html>
